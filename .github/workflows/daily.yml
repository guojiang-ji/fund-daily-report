name: Daily Update

on:
  schedule:
    - cron: '30 7 * * *'  # UTC 07:30 = 北京时间 15:30
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare requests

      - name: Generate daily report
        run: |
          # 这里放置数据更新脚本
          echo "$(date '+%Y-%m-%d %H:%M:%S') 日报更新触发" >> update.log

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: daily update $(date +%Y%m%d)"
          git push
